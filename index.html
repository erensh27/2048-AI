<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2048: SUPERCOMPUTER MODE</title>
    <style>
        :root { --bg: #050505; --accent: #00f2ff; }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; }
        .grid-container { background: #111; width: 400px; height: 400px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; border: 2px solid #333; }
        .cell { background: #222; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; border-radius: 4px; }
        button { background: var(--accent); color: black; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        #score { font-size: 2rem; color: var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="score">SCORE: 0</div>
    <div class="grid-container" id="grid"></div>
    <button id="start-btn">BOOT SEQUENCE (START AI)</button>

    <script>
        let board = Array(4).fill().map(() => Array(4).fill(0));
        let score = 0, running = false;
        
        // HEURISTIC: Snake Path + Extreme Corner Weighting
        const W = [
            [65536, 32768, 16384, 8192],
            [512, 1024, 2048, 4096],
            [256, 128, 64, 32],
            [2, 4, 8, 16]
        ];

        function init() { board = Array(4).fill().map(() => Array(4).fill(0)); addTile(); addTile(); render(); }
        function addTile() { 
            let empty = []; board.forEach((r,ri) => r.forEach((c,ci) => { if(c===0) empty.push({ri, ci}) }));
            if(empty.length) { let s = empty[Math.floor(Math.random()*empty.length)]; board[s.ri][s.ci] = Math.random()<0.9?2:4; }
        }
        
        function render() {
            document.getElementById('grid').innerHTML = board.flat().map(v => `<div class="cell">${v || ''}</div>`).join('');
            document.getElementById('score').innerText = 'SCORE: ' + score;
        }

        // ULTRA-FAST SLIDE
        function move(m, dir) {
            let res = JSON.parse(JSON.stringify(m));
            let changed = false, pts = 0;
            // Simplified slide logic for speed
            for(let i=0; i<dir; i++) res = res[0].map((_, c) => res.map(r => r[c]).reverse());
            for(let r=0; r<4; r++) {
                let row = res[r].filter(v => v);
                for(let i=0; i<row.length-1; i++) if(row[i]===row[i+1]) { row[i]*=2; pts+=row[i]; row.splice(i+1,1); changed=true; }
                let newRow = row.concat(Array(4-row.length).fill(0));
                if(newRow.join() !== res[r].join()) changed = true;
                res[r] = newRow;
            }
            for(let i=0; i<(4-dir)%4; i++) res = res[0].map((_, c) => res.map(r => r[c]).reverse());
            return { m: res, changed, pts };
        }

        function getScore(m) {
            let s = 0, empty = 0;
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) {
                if(m[r][c] === 0) empty++;
                else s += m[r][c] * W[r][c];
            }
            return s + (empty * 10000);
        }

        function expectimax(m, d) {
            if(d === 0) return getScore(m);
            let best = -Infinity;
            for(let i=0; i<4; i++) {
                let r = move(m, i);
                if(r.changed) {
                    let val = expectimax(r.m, d-1);
                    if(val > best) best = val;
                }
            }
            return best === -Infinity ? getScore(m) : best;
        }

        async function loop() {
            if(!running) return;
            let bestD = -1, bestV = -Infinity;
            for(let i=0; i<4; i++) {
                let r = move(board, i);
                if(r.changed) {
                    let v = expectimax(r.m, 5); // Depth 5 is the sweet spot for 50k+
                    if(v > bestV) { bestV = v; bestD = i; }
                }
            }
            if(bestD !== -1) {
                let r = move(board, bestD);
                board = r.m; score += r.pts; addTile(); render();
                setTimeout(loop, 0);
            }
        }

        document.getElementById('start-btn').onclick = () => { running = true; loop(); };
        init();
    </script>
</body>
</html>
